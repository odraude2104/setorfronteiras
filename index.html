<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setor Fronteiras Blog</title>
    <meta name="description" content="Blog simples com posts em JSON e homepage em cards." />
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <div>
                <a href="./" class="logo">Setor Fronteiras</a>
                <p class="tagline">Blog com posts separados em JSON e navegação por cards.</p>
            </div>
            <p class="small-note">Clique em um card para abrir a página de cada postagem.</p>
        </div>
    </header>

    <main class="container">
        <section class="intro">
            <h1>Últimos posts</h1>
            <p>Veja a página inicial em cards com thumbnails, resumo e paginação.</p>
        </section>

        <section id="posts" class="posts-grid">
            <div class="empty-state">Carregando posts...</div>
        </section>

        <nav id="pagination" class="pagination" aria-label="Paginação de posts"></nav>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>Posts definidos manualmente em arquivos JSON separados.</p>
        </div>
    </footer>

    <script src="script.js" defer></script>
</body>
</html>
