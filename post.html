<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Postagem | Setor Fronteiras</title>
  <meta name="description" content="Página de post individual do blog Setor Fronteiras." />  <link rel="icon" href="favicon.svg" type="image/svg+xml">  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div>
        <a href="./" class="logo">Setor Fronteiras</a>
        <p class="tagline">Post individual carregado por slug JSON.</p>
      </div>
    </div>
  </header>

  <main class="container">
    <section id="post-detail" class="post-detail">
      <div id="detail-header" class="detail-header"></div>
      <div class="detail-content">
        <a href="./" class="back-link">← Voltar para o blog</a>
        <h1 id="detail-title">Carregando...</h1>
        <p id="detail-meta" class="meta"></p>
        <div id="post-body" class="post-body"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Postagens criadas manualmente em JSON.</p>
    </div>
  </footer>

  <script src="js/post.js" defer></script>
</body>
</html>
